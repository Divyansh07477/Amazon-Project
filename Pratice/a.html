<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>
    <style>
  * {
    margin: 0;
  }
        .navbar{
            height: 60px;
            background-color: black;
            color: aliceblue;
             display: flex;
             justify-content: space-evenly;
             align-items: center;
            
        }
        .scope {
            position: relative;
            display: inline-block;
        }


        .cars-name{
            display: none;
            position: absolute;
            top:30px;
            background: black;
            min-width: 150px;
        }

        .scope:hover .cars-name{
            display: block;
        }
        .cars-name li{
            padding: 8px 0;
            
        }
        .cars-name a{
            color: white;
            text-decoration: none;
        
        }
        .cars-name a:hover{
            color:yellow
        }
        .v:hover{
            background-color: grey;
            padding: 10px ;
        }

        
    </style>
</head>
<body bgcolor="black">
    <div class="navbar">
    
      
         <div class="scope"> 
         <a class="v"> CARS Information</a>
           <ol class="cars-name"> 
          <li><a href="#"> BMW M5</a></li>
          <li> <a href="#"> Audi R8</a></li>   
          <li> <a href="#"> Mercedes C</a></li>     
</ol>
       </div>
       
       </div>



    
</body>
</html>
